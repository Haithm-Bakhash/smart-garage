name: AutoMesh CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    name: Run Automated Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-test.txt

      - name: Inject Secrets for Docker
        run: |
          # Create the .env file that your docker-compose requires
          echo "GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}" > ./maintenance-service/.env

      - name: Start Microservices
        run: |
          docker compose up -d
          echo "Waiting 15 seconds for RabbitMQ and APIs to boot up completely..."
          sleep 15

      - name: Run Pytest
        run: |
          pytest tests/ -v

  build:
    name: Build Docker Images
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Build API Gateway
        run: docker build -t automesh/api-gateway:latest ./api-gateway

      - name: Build Auth Service
        run: docker build -t automesh/auth-service:latest ./auth-service

      - name: Build Maintenance Service
        run: docker build -t automesh/maintenance-service:latest ./maintenance-service

      - name: Build Notification Service
        run: docker build -t automesh/notification-service:latest ./notification-service