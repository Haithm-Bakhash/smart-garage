version: '3.8'

services:
  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api-gateway:
    build: ./api-gateway
    ports:
      - "8000:8000"
    depends_on:
      - auth-service
      - maintenance-service

  auth-service:
    build: ./auth-service
    ports:
      - "8001:8000"

  maintenance-service:
    build: ./maintenance-service
    ports:
      - "8002:8000"
    env_file:
      - ./maintenance-service/.env        # ← injects GEMINI_API_KEY
    depends_on:
      rabbitmq:
        condition: service_healthy        # ← waits for real readiness

  notification-service:
    build: ./notification-service
    depends_on:
      rabbitmq:
        condition: service_healthy        # ← same fix here