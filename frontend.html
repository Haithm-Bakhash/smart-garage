<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart Garage</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, sans-serif; background: #f5f5f0; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 2rem; }
  .container { width: 100%; max-width: 480px; }
  h1 { font-size: 22px; font-weight: 600; margin-bottom: 4px; }
  .subtitle { font-size: 14px; color: #888; margin-bottom: 1.5rem; }
  .badge { background: #E1F5EE; color: #0F6E56; font-size: 11px; padding: 3px 8px; border-radius: 6px; font-weight: 500; margin-left: 8px; }
  .card { background: white; border-radius: 12px; padding: 1.25rem; margin-bottom: 1rem; border: 1px solid #e8e8e8; }
  .card-title { font-size: 11px; font-weight: 600; color: #aaa; text-transform: uppercase; letter-spacing: 0.07em; margin-bottom: 1rem; }
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  label { font-size: 13px; color: #666; display: block; margin-bottom: 5px; }
  input { width: 100%; height: 38px; padding: 0 10px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; outline: none; }
  input:focus { border-color: #1D9E75; box-shadow: 0 0 0 3px rgba(29,158,117,0.1); }
  .btn { width: 100%; height: 42px; margin-top: 1rem; background: #1D9E75; color: white; border: none; border-radius: 8px; font-size: 15px; font-weight: 500; cursor: pointer; }
  .btn:hover { background: #0F6E56; }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .issue-list { list-style: none; display: flex; flex-direction: column; gap: 8px; }
  .issue-item { display: flex; align-items: center; gap: 10px; padding: 10px 12px; background: #f9f9f7; border-radius: 8px; font-size: 14px; }
  .dot { width: 8px; height: 8px; border-radius: 50%; background: #EF9F27; flex-shrink: 0; }
  .cost-row { display: flex; align-items: baseline; gap: 8px; margin-top: 1rem; padding-top: 1rem; border-top: 1px solid #eee; }
  .cost-label { font-size: 13px; color: #888; }
  .cost-value { font-size: 26px; font-weight: 600; }
  .ai-notes { margin-top: 1rem; padding: 12px; background: #E1F5EE; border-radius: 8px; font-size: 13px; color: #0F6E56; line-height: 1.6; }
  .error { display: none; padding: 12px; background: #FEE; border-radius: 8px; font-size: 13px; color: #c00; margin-bottom: 1rem; }
  .error.show { display: block; }
  .result { display: none; }
  .result.show { display: block; }
  .spinner { display: inline-block; width: 16px; height: 16px; border: 2px solid rgba(255,255,255,0.4); border-top-color: white; border-radius: 50%; animation: spin 0.7s linear infinite; vertical-align: middle; margin-right: 6px; }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div class="container">
  <h1>Smart Garage <span class="badge">live</span></h1>
  <p class="subtitle">AI-powered vehicle maintenance predictor</p>

  <div class="error" id="err"></div>

  <div class="card">
    <div class="card-title">Vehicle details</div>
    <div class="grid">
      <div><label>Make</label><input id="make" value="Toyota" /></div>
      <div><label>Model</label><input id="model" value="Camry" /></div>
      <div><label>Year</label><input id="year" type="number" value="2015" /></div>
      <div><label>Mileage</label><input id="mileage" type="number" value="95000" /></div>
    </div>
    <button class="btn" id="btn" onclick="analyze()">Analyze vehicle</button>
  </div>

  <div class="card result" id="result">
    <div class="card-title">Maintenance prediction</div>
    <ul class="issue-list" id="issues"></ul>
    <div class="cost-row">
      <span class="cost-label">Estimated cost</span>
      <span class="cost-value" id="cost"></span>
    </div>
    <div class="ai-notes" id="notes"></div>
  </div>
</div>

<script>
async function analyze() {
  const btn = document.getElementById('btn');
  const err = document.getElementById('err');
  const result = document.getElementById('result');
  err.classList.remove('show');
  result.classList.remove('show');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>Analyzing...';
  try {
    const res = await fetch('http://localhost:8000/predict', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer super-secret-jwt-token-123' },
      body: JSON.stringify({
        make: document.getElementById('make').value,
        model: document.getElementById('model').value,
        year: parseInt(document.getElementById('year').value),
        mileage: parseInt(document.getElementById('mileage').value)
      })
    });
    if (!res.ok) throw new Error(`Server error ${res.status}`);
    const data = await res.json();
    document.getElementById('issues').innerHTML = data.upcoming_issues.map(i => `<li class="issue-item"><span class="dot"></span>${i}</li>`).join('');
    document.getElementById('cost').textContent = '$' + data.estimated_cost_usd.toLocaleString();
    document.getElementById('notes').textContent = data.ai_notes;
    result.classList.add('show');
  } catch(e) {
    err.textContent = 'Could not connect: ' + e.message;
    err.classList.add('show');
  } finally {
    btn.disabled = false;
    btn.innerHTML = 'Analyze vehicle';
  }
}
</script>
</body>
</html>
