<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Smart Garage</title>
  <style>

*, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f5f5f0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .container {
      width: 100%;
      max-width: 480px;
    }

    .header h1 {
      font-size: 22px;
      font-weight: 600;
      margin-bottom: 4px;
    }

    .header .subtitle {
      font-size: 14px;
      color: #888;
      margin-bottom: 1.5rem;
    }

    .badge {
      background: #E1F5EE;
      color: #0F6E56;
      font-size: 11px;
      font-weight: 500;
      padding: 3px 8px;
      border-radius: 6px;
      margin-left: 8px;
    }

    .card {
      background: white;
      border: 1px solid #e8e8e8;
      border-radius: 12px;
      padding: 1.25rem;
      margin-bottom: 1rem;
    }

    .card-title {
      font-size: 11px;
      font-weight: 600;
      color: #aaa;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      margin-bottom: 1rem;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .field label {
      display: block;
      font-size: 13px;
      color: #666;
      margin-bottom: 5px;
    }

    .field input {
      width: 100%;
      height: 38px;
      padding: 0 10px;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: 14px;
      outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
    }

    .field input:focus {
      border-color: #1D9E75;
      box-shadow: 0 0 0 3px rgba(29, 158, 117, 0.1);
    }

    .btn-analyze {
      width: 100%;
      height: 42px;
      margin-top: 1rem;
      background: #1D9E75;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s;
    }

    .btn-analyze:hover  { background: #0F6E56; }
    .btn-analyze:disabled { opacity: 0.5; cursor: not-allowed; }

    .spinner {
      display: inline-block;
      width: 16px;
      height: 16px;
      border: 2px solid rgba(255, 255, 255, 0.4);
      border-top-color: white;
      border-radius: 50%;
      vertical-align: middle;
      margin-right: 6px;
      animation: spin 0.7s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .error-banner {
      display: none;
      padding: 12px;
      background: #FEE;
      border-radius: 8px;
      font-size: 13px;
      color: #c00;
      margin-bottom: 1rem;
    }

    .error-banner.show { display: block; }

    .result-card { display: none; }
    .result-card.show { display: block; }

    .issue-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .issue-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      background: #f9f9f7;
      border-radius: 8px;
      font-size: 14px;
    }

    .issue-dot {
      width: 8px;
      height: 8px;
      flex-shrink: 0;
      border-radius: 50%;
      background: #EF9F27;
    }

    .cost-row {
      display: flex;
      align-items: baseline;
      gap: 8px;
      margin-top: 1rem;
      padding-top: 1rem;
      border-top: 1px solid #eee;
    }

    .cost-label { font-size: 13px; color: #888; }
    .cost-value { font-size: 26px; font-weight: 600; }

    .ai-notes {
      margin-top: 1rem;
      padding: 12px;
      background: #E1F5EE;
      border-radius: 8px;
      font-size: 13px;
      color: #0F6E56;
      line-height: 1.6;
    }
  </style>
</head>
<body>

  <div class="container">

    <header class="header">
      <h1>Smart Garage <span class="badge">live</span></h1>
      <p class="subtitle">AI-powered vehicle maintenance predictor</p>
    </header>

    <div class="error-banner" id="errorBanner"></div>

    <div class="card">
      <p class="card-title">Vehicle Details</p>
      <div class="grid">
        <div class="field">
          <label for="make">Make</label>
          <input id="make" type="text" value="Toyota" />
        </div>
        <div class="field">
          <label for="model">Model</label>
          <input id="model" type="text" value="Camry" />
        </div>
        <div class="field">
          <label for="year">Year</label>
          <input id="year" type="number" value="2015" />
        </div>
        <div class="field">
          <label for="mileage">Mileage</label>
          <input id="mileage" type="number" value="95000" />
        </div>
      </div>
      <button class="btn-analyze" id="analyzeBtn" onclick="analyzeVehicle()">
        Analyze Vehicle
      </button>
    </div>

    <div class="card result-card" id="resultCard">
      <p class="card-title">Maintenance Prediction</p>
      <ul class="issue-list" id="issueList"></ul>
      <div class="cost-row">
        <span class="cost-label">Estimated cost</span>
        <span class="cost-value" id="estimatedCost"></span>
      </div>
      <div class="ai-notes" id="aiNotes"></div>
    </div>

  </div>

  <script>

    const API_BASE    = "http://localhost:8000";
    const CREDENTIALS = { username: "haithm", password: "smartgarage" };

    const analyzeBtn  = document.getElementById("analyzeBtn");
    const errorBanner = document.getElementById("errorBanner");
    const resultCard  = document.getElementById("resultCard");
    const issueList   = document.getElementById("issueList");
    const estimatedCost = document.getElementById("estimatedCost");
    const aiNotes     = document.getElementById("aiNotes");


    function setLoading(isLoading) {
      analyzeBtn.disabled = isLoading;
      analyzeBtn.innerHTML = isLoading
        ? '<span class="spinner"></span>Analyzing...'
        : "Analyze Vehicle";
    }

    function showError(message) {
      errorBanner.textContent = "Could not connect: " + message;
      errorBanner.classList.add("show");
    }

    function hideError() {
      errorBanner.classList.remove("show");
    }

    function showResults(data) {
      issueList.innerHTML = data.upcoming_issues
        .map(issue => `
          <li class="issue-item">
            <span class="issue-dot"></span>
            ${issue}
          </li>
        `)
        .join("");

      estimatedCost.textContent = "$" + data.estimated_cost_usd.toLocaleString();
      aiNotes.textContent = data.ai_notes;
      resultCard.classList.add("show");
    }

    function hideResults() {
      resultCard.classList.remove("show");
    }

    async function login() {
      const res = await fetch(`${API_BASE}/login`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(CREDENTIALS),
      });

      if (!res.ok) throw new Error(`Authentication failed (Status ${res.status})`);

      const data = await res.json();
      return data.access_token;
    }

    async function predict(token, vehicleData) {
      const res = await fetch(`${API_BASE}/predict`, {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "Authorization": `Bearer ${token}`,
        },
        body: JSON.stringify(vehicleData),
      });

      if (!res.ok) throw new Error(`AI Service error (Status ${res.status})`);

      return res.json();
    }

    async function analyzeVehicle() {
      hideError();
      hideResults();
      setLoading(true);

      const vehicleData = {
        make:    document.getElementById("make").value,
        model:   document.getElementById("model").value,
        year:    parseInt(document.getElementById("year").value),
        mileage: parseInt(document.getElementById("mileage").value),
      };

      try {
        const token = await login();
        const data  = await predict(token, vehicleData);
        showResults(data);
      } catch (err) {
        showError(err.message);
      } finally {
        setLoading(false);
      }
    }
  </script>

</body>
</html>
