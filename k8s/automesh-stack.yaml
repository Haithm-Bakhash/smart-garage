---
# 1. Message Broker: RabbitMQ
apiVersion: apps/v1
kind: Deployment
metadata:
  name: rabbitmq
spec:
  selector:
    matchLabels:
      app: rabbitmq
  template:
    metadata:
      labels:
        app: rabbitmq
    spec:
      containers:
      - name: rabbitmq
        image: rabbitmq:3-management
        ports:
        - containerPort: 5672
        - containerPort: 15672
---
apiVersion: v1
kind: Service
metadata:
  name: rabbitmq
spec:
  selector:
    app: rabbitmq
  ports:
    - port: 5672
      targetPort: 5672
      name: amqp
    - port: 15672
      targetPort: 15672
      name: management

---
# 2. Auth Service
apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
spec:
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service
    spec:
      containers:
      - name: auth-service
        image: automesh/auth-service:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 8000
---
apiVersion: v1
kind: Service
metadata:
  name: auth-service
spec:
  selector:
    app: auth-service
  ports:
    - port: 8000
      targetPort: 8000

---
# 3. Maintenance Service
apiVersion: apps/v1
kind: Deployment
metadata:
  name: maintenance-service
spec:
  selector:
    matchLabels:
      app: maintenance-service
  template:
    metadata:
      labels:
        app: maintenance-service
    spec:
      containers:
      - name: maintenance-service
        image: automesh/maintenance-service:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 8000
        env:
        # In a real cloud, these come from K8s Secrets. 
        # Hardcoded here for the assignment's local demo.
        - name: GEMINI_API_KEY
          value: "your_actual_gemini_key_here"
        - name: MAINTENANCE_API_KEY
          value: "my-super-secret-password"
---
apiVersion: v1
kind: Service
metadata:
  name: maintenance-service
spec:
  selector:
    app: maintenance-service
  ports:
    - port: 8000
      targetPort: 8000

---
# 4. Notification Service (Worker - No Service needed)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification-service
spec:
  selector:
    matchLabels:
      app: notification-service
  template:
    metadata:
      labels:
        app: notification-service
    spec:
      containers:
      - name: notification-service
        image: automesh/notification-service:latest
        imagePullPolicy: Never

---
# 5. API Gateway (Exposed to the outside world)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
spec:
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      containers:
      - name: api-gateway
        image: automesh/api-gateway:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 8000
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
spec:
  type: LoadBalancer # This maps port 8000 to your MacBook's localhost
  selector:
    app: api-gateway
  ports:
    - port: 8000
      targetPort: 8000